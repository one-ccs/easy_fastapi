[project]
name = "easy_fastapi"
version = "1.0.0"
description = "Easy FastAPI 运行时库：扩展化 FastAPI 框架 + ORM/auth/redis/migration 扩展。"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "one-ccs", email = "one-ccs@foxmal.com"}]
keywords = ["fastapi", "tortoise", "sqlalchemy", "sqlmodel", "openapi"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "pydantic>=2.10.6",
    "fastapi>=0.115.4",
    "pyyaml>=6.0.2",
    "pyjwt>=2.9.0",
    "pwdlib[argon2]>=0.2.0",
    "bcrypt>=4.0.0",
    "email-validator>=2.3.0",
    "python-multipart>=0.0.32",
    "jinja2>=3.1.0",
]

[project.urls]
Homepage = "https://github.com/one-ccs/easy_fastapi"
Documentation = "https://github.com/one-ccs/easy_fastapi/docs"
Issues = "https://github.com/one-ccs/easy_fastapi/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/easy_fastapi"]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"
